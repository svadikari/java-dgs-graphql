spring:
  application:
    name: book-service
  jmx:
    enabled: false
  data:
    jpa:
      repositories:
        enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/books
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
  graphql:
    schema:
      additional-files: schema
    graphiql:
      enabled: true
server:
  port: 4001

users-api:
  base_url: http://localhost:4002/graphql