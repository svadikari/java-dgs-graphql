type Query {
books: [Book]
}

type Mutation {
    createBook(book: CreateBook): Book
}

input CreateBook {
    title: String!
    authorIds: String
}

type Book {
    id: ID!
    title: String!
    authorIds: String
    authors: [Author]
    reviews: [Review]
}

type Author {
    id: ID!
    name: String!
    books: [Book]
}

type Review {
    id: ID!
    comment: String!
    rating: Int
    reviewer: String!
}